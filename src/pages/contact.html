  <main>
    <section class="corporate-hero" data-od-id="hero"><div class="container hero-split"><div><p class="eyebrow">Contact Us</p><h1>관심 솔루션과 검토 맥락을 함께 남겨주세요.</h1><p class="lead">구매문의는 단순 연락처가 아니라, 어떤 솔루션 화면을 보고 들어왔는지 이어 받을 수 있는 상담 진입점입니다.</p></div><form class="card stack" data-od-id="contact-form"><div class="field"><label for="solution">관심 솔루션</label><select class="input" id="solution"><option>BotfenderAI</option><option>AnomixAI</option><option>PentraFlow</option><option>개판</option><option>VMS</option><option>기타 협력 문의</option></select></div><div class="field"><label for="name">이름 / 회사</label><input class="input" id="name" placeholder="담당자와 회사명을 입력하세요" /></div><div class="field"><label for="email">연락처</label><input class="input" id="email" placeholder="이메일 또는 전화번호" /></div><div class="field"><label for="message">문의 내용</label><textarea class="textarea" id="message" rows="5" placeholder="도입 목적, 현재 운영 환경, 검토 중인 화면을 적어주세요"></textarea></div><button class="btn btn-primary" type="button">문의 내용 확인</button></form></div></section>
    <section class="section" data-od-id="contact-path"><div class="container grid-3"><div><p class="eyebrow">Flow</p><h2>상담 전환 경로.</h2></div><div class="card"><h3>솔루션 확인</h3><p class="lead">상세 페이지에서 화면 메뉴를 직접 확인합니다.</p></div><div class="card"><h3>문의 제출</h3><p class="lead">관심 솔루션과 상황을 남기고 기술 상담으로 이어집니다.</p></div></div></section>
